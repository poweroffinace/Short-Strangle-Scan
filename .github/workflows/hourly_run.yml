name: Short Strangle Hourly Sync

on:
  schedule:
    # Runs every hour at the 30th minute 
    # From 02:30 UTC (8:00 AM IST) to 10:30 UTC (4:00 PM IST)
    - cron: '30 2-10 * * *'
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance beautifulsoup4 scipy nselib requests

      - name: Run short strangle script
        run: python "short_strangle.py"

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Adding all CSVs in the data folder
          git add data/*.csv
          git commit -m "Hourly Strangle Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
